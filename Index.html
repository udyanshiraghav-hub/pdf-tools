
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Compressor</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 420px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 17px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
    }

    .info {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.9;
    }

    .download-btn {
      display: none;
      text-decoration: none;
      margin-top: 20px;
      background: #22c55e;
      padding: 14px;
      border-radius: 10px;
      color: white;
      display: inline-block;
      width: 100%;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>PDF Compressor</h1>

    <input type="file" id="pdfFile" accept="application/pdf" />

    <input type="number" id="targetSize" placeholder="Target Size in KB (e.g. 100)" />

    <button onclick="compressPDF()">Compress PDF</button>

    <p class="info" id="status"></p>

    <a id="downloadBtn" class="download-btn">Download Compressed PDF</a>
```
