
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Compressor Pro</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 25px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    .upload-box {
      border: 2px dashed #38bdf8;
      border-radius: 20px;
      padding: 40px 20px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    .upload-box:hover {
      background: rgba(56,189,248,0.1);
    }

    input {
      display: none;
    }

    .btn {
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
      font-weight: bold;
    }

    .compress-btn {
      background: #0ea5e9;
      color: white;
    }

    .compress-btn:hover {
      background: #0284c7;
    }

    .download-btn {
      background: #22c55e;
      color: white;
      text-decoration: none;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .download-btn:hover {
      background: #16a34a;
    }

    .file-name {
      margin-top: 15px;
      color: #facc15;
      font-size: 15px;
    }

    .loading {
      margin-top: 20px;
      display: none;
      color: #38bdf8;
      font-weight: bold;
    }

    footer {
      margin-top: 25px;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>PDF Compressor Pro</h1>
    <p>Compress your PDF files instantly with premium quality.</p>

    <label class="upload-box" for="pdfInput">
      <h2>📄 Upload PDF</h2>
      <p>Click here to select your PDF</p>
    </label>

    <input type="file" id="pdfInput" accept="application/pdf" />

    <div class="file-name" id="fileName"></div>

    <button class="btn compress-btn" onclick="compressPDF()">
      Compress PDF
    </button>

    <div class="loading" id="loading">
      Compressing PDF...
    </div>

    <a id="downloadBtn" class="btn download-btn" download="compressed.pdf">
      Download Compressed PDF
    </a>

    <footer>
      Made with ❤️ for GitHub Pages
    </footer>
  </div>

  <script>
    const pdfInput = document.getElementById('pdfInput');
    const fileName = document.getElementById('fileName');
    const loading = document.getElementById('loading');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;

    pdfInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];

      if (selectedFile) {
        fileName.innerHTML = `Selected File: ${selectedFile.name}`;
      }
    });

    async function compressPDF() {
      if (!selectedFile) {
        alert('Please upload a PDF file first.');
        return;
      }

      loading.style.display = 'block';
      downloadBtn.style.display = 'none';

      try {
        const arrayBuffer = await selectedFile.arrayBuffer();

        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

        const compressedPdfBytes = await pdfDoc.save({
          useObjectStreams: true,
          addDefaultPage: false,
          objectsPerTick: 20,
        });

        const blob = new Blob([compressedPdfBytes], {
          type: 'application/pdf',
        });

        const url = URL.createObjectURL(blob);

        downloadBtn.href = url;
        downloadBtn.style.display = 'flex';

        loading.style.display = 'none';
      } catch (error) {
        console.error(error);
        loading.style.display = 'none';
        alert('Error compressing PDF');
      }
    }
  </script>

</body>
</html>
